env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

name: STAP Energie Deploy Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'content/**.json'
      - 'images/**'
      - '.github/workflows/deploy.yml'

jobs:

  security-check:
    name: Security Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Security scan
        run: |
          python3 << 'EOF'
          import os, sys, json, glob
          from pathlib import Path
          print("Security Agent gestart...")
          issues = []
          for fp in glob.glob('content/**/*.json', recursive=True):
              try:
                  json.load(open(fp))
                  print(f"  OK: {fp}")
              except Exception as e:
                  issues.append(f"{fp}: {e}")
          imgs = list(Path('images').glob('*')) if Path('images').exists() else []
          print(f"  images/: {len(imgs)} bestanden")
          if issues:
              [print(f"  FOUT: {i}") for i in issues]
              sys.exit(1)
          print("Security Agent: alle checks OK")
          EOF

  deploy-to-wordpress:
    name: Deploy Agent
    runs-on: ubuntu-latest
    needs: security-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Deploy homepage naar WordPress
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          python3 << 'PYEOF'
          import os, sys, json, requests, base64
          from pathlib import Path

          wp   = os.environ['WP_URL'].rstrip('/')
          user = os.environ['WP_USERNAME']
          pw   = os.environ['WP_APP_PASSWORD']
          tok  = base64.b64encode(f"{user}:{pw}".encode()).decode()
          h    = {'Authorization': f'Basic {tok}', 'Content-Type': 'application/json'}

          # Verbinding testen
          r = requests.get(f"{wp}/wp-json/wp/v2/users/me", headers=h)
          if r.status_code != 200:
              print(f"Verbinding mislukt: {r.status_code}"); sys.exit(1)
          print(f"Verbonden als: {r.json().get('name')}")

          # Bestandsnamen -> interne sleutels
          NAME_MAP = {
              'hero':                ['hero.png','Hero Gemengd zakelijk pand + PV panelen.png','Hero_Gemengd_zakelijk_pand___PV_panelen.png'],
              'erik-zakelijk':       ['erik-zakelijk.png','Over Erik (persoonlijk beeld) Zakelijk.png','Over_Erik__persoonlijk_beeld__Zakelijk.png'],
              'erik-woning':         ['erik-woning.png','Over Erik (persoonlijk beeld).png','Over_Erik__persoonlijk_beeld_.png'],
              'segment-mkb':         ['segment-mkb.png','Segment MKB.png','Segment_MKB.png'],
              'segment-particulieren':['segment-particulieren.png','Segment Particulieren.png','Segment_Particulieren.png'],
              'segment-vastgoed':    ['segment-vastgoed.png','Segment Vastgoed & Makelaars.png','Segment_Vastgoed___Makelaars.png'],
              'segment-gemeenten':   ['segment-gemeenten.png','Segment Gemeenten & Woningstichtingen.png','Segment_Gemeenten___Woningstichtingen.png'],
              'dienst-subsidie':     ['dienst-subsidie.png','Diensten-card Subsidie advies.png','Diensten-card_Subsidie_advies.png'],
              'dienst-inkoop':       ['dienst-inkoop.png','Diensten-card Energie inkoop.png','Diensten-card_Energie_inkoop.png'],
              'dienst-verduurzaming':['dienst-verduurzaming.png','Diensten-card Verduurzaming advies.png','Diensten-card_Verduurzaming_advies.png'],
          }
          f2k = {name: key for key, names in NAME_MAP.items() for name in names}

          # Afbeeldingen uploaden en IDs ophalen
          print("\nAfbeeldingen uploaden...")
          mids = {}
          for p in sorted(Path('images').glob('*')):
              if p.suffix.lower() not in ['.png','.jpg','.jpeg','.webp']: continue
              sk = f2k.get(p.name)
              if not sk: print(f"  Overgeslagen: {p.name}"); continue
              s = requests.get(f"{wp}/wp-json/wp/v2/media", headers=h, params={'search': sk, 'per_page': 5})
              if s.status_code == 200 and s.json():
                  mids[sk] = s.json()[0]['id']
                  print(f"  Bestaat al: {p.name} -> ID {mids[sk]}")
                  continue
              mt = 'image/png' if p.suffix.lower() == '.png' else 'image/jpeg'
              uh = {**h, 'Content-Disposition': f'attachment; filename="{sk}{p.suffix}"', 'Content-Type': mt}
              del uh['Content-Type']
              uh['Content-Type'] = mt
              with open(p, 'rb') as f:
                  resp = requests.post(f"{wp}/wp-json/wp/v2/media",
                      headers={**{'Authorization': f'Basic {tok}'}, 'Content-Disposition': f'attachment; filename="{sk}{p.suffix}"', 'Content-Type': mt},
                      data=f.read())
              if resp.status_code == 201:
                  mids[sk] = resp.json()['id']
                  print(f"  Geupload: {p.name} -> ID {mids[sk]}")
              else:
                  print(f"  Fout {p.name}: {resp.status_code}")
          print(f"  {len(mids)} afbeeldingen klaar\n")

          def mid(k): return mids.get(k, 0)

          # Homepage data als schone JSON
          homepage_data = {
              "page": "homepage",
              "data": {
                  "title": "STAP Energie — Energielabels & Verduurzamingsadvies",
                  "hero_badge": "Energielabel & verduurzamingsadvies voor heel Nederland",
                  "hero_heading": "Duurzame impact maken is leuk",
                  "hero_subtext": "STAP Energie helpt ondernemers en woningeigenaren stap voor stap verduurzamen. Van energielabel tot een concreet plan dat past bij jouw situatie, portemonnee en doelen.",
                  "hero_cta": "Plan een gratis kennismaking",
                  "hero_image_id": mid('hero'),
                  "segments": [
                      {"title": "MKB & Bedrijven", "desc": "Energielabels, inkoop en verduurzaming voor ondernemers.", "slug": "mkb-bedrijven", "image_id": mid('segment-mkb')},
                      {"title": "Particulieren", "desc": "Energielabel en verduurzamingsadvies voor woningeigenaren.", "slug": "particulieren", "image_id": mid('segment-particulieren')},
                      {"title": "Vastgoed & Makelaars", "desc": "Labels en WWS-optimalisatie voor vastgoedprofessionals.", "slug": "vastgoed-makelaars", "image_id": mid('segment-vastgoed')},
                      {"title": "Gemeenten & Woningstichtingen", "desc": "Verduurzaming op schaal voor corporaties en gemeenten.", "slug": "gemeenten-woningstichtingen", "image_id": mid('segment-gemeenten')},
                  ],
                  "diensten": [
                      {"title": "Energielabels woningen", "desc": "Verplicht bij verkoop en verhuur. Snel en officieel geregeld.", "slug": "energielabel-woningen", "image_id": 0},
                      {"title": "Energielabels utiliteit", "desc": "Verplicht label voor bedrijfspanden en kantoren.", "slug": "energielabel-utiliteit", "image_id": 0},
                      {"title": "Verduurzaming advies", "desc": "Persoonlijk stappenplan op maat voor uw situatie.", "slug": "verduurzaming-advies", "image_id": mid('dienst-verduurzaming')},
                      {"title": "Subsidie advies", "desc": "Meer subsidie dan u denkt. Wij brengen uw kansen in kaart.", "slug": "subsidie-advies", "image_id": mid('dienst-subsidie')},
                      {"title": "Energie inkoop advies", "desc": "Slim inkopen op het juiste moment. Structureel besparen.", "slug": "energie-inkoop-advies", "image_id": mid('dienst-inkoop')},
                  ],
                  "erik": {
                      "name": "Erik Dolman",
                      "image_id": mid('erik-woning'),
                      "bio": "Als oprichter van STAP Energie combineer ik ruime ervaring in de energiemarkt met een oprechte passie voor duurzaamheid. Mensen komen naar mij toe omdat ik dingen kan uitleggen en uitzoeken — en dat vind ik mooi.",
                      "quote": "De natuur is ons grootste kapitaal. Verduurzamen is een verstandige keuze voor het milieu, comfort én je portemonnee.",
                      "credential": "EPA-adviseur in opleiding (EPUB) — certificering verwacht 2025",
                  },
                  "cta": {
                      "heading": "Klaar voor jouw eerste STAP?",
                      "subtext": "Gratis kennismakingsgesprek — geen verplichtingen, wel direct waarde.",
                      "button": "Gratis gesprek inplannen",
                  }
              }
          }

          # Sturen naar de plugin
          print("Homepage deployen via STAP plugin...")
          resp = requests.post(
              f"{wp}/wp-json/stap/v1/deploy",
              headers=h,
              json=homepage_data
          )

          if resp.status_code == 200:
              result = resp.json()
              hp = result.get('results', {}).get('homepage', {})
              print(f"  Homepage {hp.get('action','?')}: {hp.get('url','')}")
              print("\nDeploy succesvol!")
          else:
              print(f"  Fout: {resp.status_code}")
              print(f"  {resp.text[:300]}")
              sys.exit(1)
          PYEOF
