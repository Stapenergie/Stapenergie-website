name: STAP Energie Deploy Pipeline v2

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - 'content/**.json'
      - 'images/**.png'
      - 'images/**.jpg'

jobs:
  security-check:
    name: Security Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - name: Security scan
        run: |
          python3 -c "
          import os,sys,re,glob,json
          print('Security Agent gestart...')
          issues=[]
          for f in glob.glob('content/**/*.json',recursive=True):
              try: json.load(open(f))
              except Exception as e: issues.append(f'{f}: {e}')
              if re.search(r'password\s*[:=]\s*[\"\']\S{6,}[\"\']',open(f).read(),re.I): issues.append(f'{f}: hardcoded wachtwoord')
          for f in glob.glob('images/*'):
              if os.path.getsize(f)>5*1024*1024: issues.append(f'{f}: te groot')
          if issues:
              print('GEBLOKKEERD:'); [print(i) for i in issues]; sys.exit(1)
          print('Alle checks OK.')
          "

  upload-media:
    name: Media Agent
    runs-on: ubuntu-latest
    needs: security-check
    outputs:
      media_ids: ${{ steps.upload.outputs.media_ids }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - run: pip install requests
      - name: Upload afbeeldingen
        id: upload
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          python3 << 'EOF'
          import os,sys,requests,base64,glob,json
          wp=os.environ['WP_URL'].rstrip('/')
          tok=base64.b64encode(f"{os.environ['WP_USERNAME']}:{os.environ['WP_APP_PASSWORD']}".encode()).decode()
          h={'Authorization':f'Basic {tok}'}
          r=requests.get(f"{wp}/wp-json/wp/v2/users/me",headers=h)
          if not r.ok: print(f"Verbinding mislukt: {r.status_code}"); sys.exit(1)
          print(f"Verbonden als: {r.json().get('name')}")
          ids={}
          alt={'hero':'Duurzaam bedrijventerrein met zonnepanelen - STAP Energie','erik-zakelijk':'Erik Dolman energieadviseur STAP Energie','erik-woning':'Erik Dolman voor woning met zonnepanelen','segment-mkb':'MKB energieadvies STAP Energie','segment-particulieren':'Energielabel particulieren STAP Energie','segment-vastgoed':'Vastgoed energielabel STAP Energie','segment-gemeenten':'Duurzame wijk luchtfoto STAP Energie','dienst-subsidie':'Subsidie advies STAP Energie','dienst-inkoop':'Energie inkoop advies STAP Energie','dienst-verduurzaming':'Verduurzaming advies STAP Energie'}
          for fp in glob.glob('images/*.png')+glob.glob('images/*.jpg'):
              fn=os.path.basename(fp); slug=os.path.splitext(fn)[0]
              s=requests.get(f"{wp}/wp-json/wp/v2/media",headers=h,params={'slug':slug,'per_page':1})
              ex=[m for m in (s.json() if s.ok else []) if m.get('slug')==slug]
              if ex: ids[slug]=ex[0]['id']; print(f"Bestaat: {fn} ID:{ids[slug]}"); continue
              mt='image/png' if fn.endswith('.png') else 'image/jpeg'
              uh={**h,'Content-Disposition':f'attachment; filename="{fn}"','Content-Type':mt}
              with open(fp,'rb') as f: ur=requests.post(f"{wp}/wp-json/wp/v2/media",headers=uh,data=f.read())
              if ur.status_code in[200,201]:
                  mid=ur.json()['id']; ids[slug]=mid
                  requests.post(f"{wp}/wp-json/wp/v2/media/{mid}",headers={**h,'Content-Type':'application/json'},json={'alt_text':alt.get(slug,f'STAP Energie {slug}'),'slug':slug})
                  print(f"Geupload: {fn} ID:{mid}")
              else: print(f"Fout {fn}: {ur.status_code}")
          ij=json.dumps(ids)
          print(f"Media IDs: {ij}")
          with open(os.environ['GITHUB_OUTPUT'],'a') as f: f.write(f"media_ids={ij}\n")
          print(f"Media Agent klaar: {len(ids)} afbeeldingen.")
          EOF

  deploy-pages:
    name: Deploy Agent
    runs-on: ubuntu-latest
    needs: upload-media
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - run: pip install requests
      - name: Publiceer paginas naar WordPress
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          MEDIA_IDS: ${{ needs.upload-media.outputs.media_ids }}
        run: python3 deploy_pages.py
